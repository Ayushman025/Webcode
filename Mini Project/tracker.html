<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Expense Tracker</title>
    <link rel="stylesheet" href="Design.css">
</head>
<body>

    <!-- Header -->
    <header class="app-header">
        <h1>My Expense Tracker</h1>
        <p>Track your monthly spending</p>
    </header>

    <!-- Main Content -->
    <main class="dashboard">

        <!-- Summary Cards Section -->
        <section class="summary-section">

            <div class="summary-card">
                <h2>Total Spent</h2>
                <p>₹18,500</p>
            </div>

            <div class="summary-card">
                <h2>Highest Category</h2>
                <p>Shopping</p>
            </div>

            <div class="summary-card">
                <h2>Current Month</h2>
                <p>February</p>
            </div>

        </section>

        <!-- Expense Categories Section -->
        <section class="category-section">
            <h2>Expense Categories</h2>

            <div class="category-item">
                <p class="category-name">Food</p>
                <p class="category-amount">₹6,000</p>
            </div>

            <div class="category-item">
                <p class="category-name">Transport</p>
                <p class="category-amount">₹3,500</p>
            </div>

            <div class="category-item">
                <p class="category-name">Shopping</p>
                <p class="category-amount">₹7,000</p>
            </div>

            <div class="category-item">
                <p class="category-name">Entertainment</p>
                <p class="category-amount">₹2,000</p>
            </div>

        </section>

    </main>

    <!-- Footer -->
    <footer class="app-footer">
        <p>&copy; 2026 My Expense Tracker</p>
    </footer>

</body>
</html>
